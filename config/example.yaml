# Example configuration file
# Copy this to config.yaml and modify as needed

# Feature flags - control optional functionality
features:
  # Master toggle for all AI features
  # When false, the system uses only content-based and rule-based scoring
  ai_enabled: false

  # Vector embeddings for semantic similarity (requires ai_enabled)
  # Uses ChromaDB to find semantically similar content
  embeddings_enabled: false

  # LLM-powered recommendation reasoning (requires ai_enabled)
  # Uses Ollama to generate natural language explanations
  llm_reasoning_enabled: false

# Ollama configuration (only used if features.ai_enabled is true)
ollama:
  base_url: "http://localhost:11434"
  model: "mistral:7b"  # Model for recommendations (text generation)
  embedding_model: "nomic-embed-text"  # Model for generating embeddings
  # Note: Install embedding model with: ollama pull nomic-embed-text
  # See docs/MODEL_RECOMMENDATIONS.md for model selection guide

# Storage configuration
storage:
  # SQLite database path
  database_path: "data/recommendations.db"
  
  # Vector database (ChromaDB) path
  vector_db_path: "data/chroma_db"
  
  # Cache directory
  cache_dir: "data/cache"

# Ingestion settings
ingestion:
  # Conflict resolution strategy when the same item is imported from multiple sources.
  # Options: last_write_wins, source_priority, keep_existing
  conflict_strategy: "last_write_wins"
  # Source priority ordering (highest priority first).
  # Only used with source_priority strategy.
  source_priority: ["goodreads", "steam"]

# Input files configuration
inputs:
  goodreads:
    path: "inputs/goodreads_library_export.csv"
    enabled: true
  
  steam:
    # Steam Web API configuration
    # Get your API key from: https://steamcommunity.com/dev/apikey
    api_key: ""  # Your Steam Web API key
    # Either provide steam_id (64-bit Steam ID) or vanity_url (username/custom URL)
    steam_id: ""  # Your Steam ID (64-bit)
    vanity_url: ""  # Alternative: Your Steam username or custom URL
    # Minimum playtime in minutes to include a game (default: 0 = include all)
    min_playtime_minutes: 0
    enabled: false  # Set to true to enable Steam import
  
  # Generic CSV import — use templates from templates/ directory
  csv_import:
    csv_path: "inputs/my_movies.csv"  # Path to your CSV file
    content_type: "movie"  # book, movie, tv_show, or video_game
    enabled: false

  # Generic JSON import — use templates from templates/ directory
  json_import:
    json_path: "inputs/my_books.json"  # Path to your JSON or JSONL file
    content_type: "book"  # book, movie, tv_show, or video_game
    enabled: false

  # Generic Markdown import — use templates from templates/ directory
  markdown_import:
    markdown_path: "inputs/my_tv_shows.md"  # Path to your Markdown file
    content_type: "tv_show"  # book, movie, tv_show, or video_game
    enabled: false

  # Sonarr integration (TV show library manager)
  sonarr:
    url: "http://localhost:8989"  # Sonarr base URL
    api_key: ""  # Sonarr API key (Settings > General > API Key)
    enabled: false

  # Radarr integration (Movie library manager)
  radarr:
    url: "http://localhost:7878"  # Radarr base URL
    api_key: ""  # Radarr API key (Settings > General > API Key)
    enabled: false

  # Future sources can be added here

# Web interface configuration
web:
  host: "0.0.0.0"  # Listen on all interfaces (for internal network access)
  port: 18473  # Non-standard port to avoid collisions with other services
  debug: true  # Enable auto-reload on file changes (set to false for production)

# Recommendation settings
recommendations:
  default_count: 5
  max_count: 20
  min_rating_for_preference: 4  # Only consider items rated 4+ as "liked"

  # Scorer weights for the non-AI recommendation pipeline.
  # Higher weight = more influence on final ranking.
  # Set a weight to 0 to disable a scorer entirely.
  scorer_weights:
    genre_match: 2.0
    creator_match: 1.5
    tag_overlap: 1.0
    series_order: 1.5
    rating_pattern: 1.0

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/recommendations.log"
