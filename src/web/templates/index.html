<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Recommendations</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header with user selector -->
    <div class="header">
        <h1>Personal Recommendations</h1>
        <div class="user-selector">
            <label for="userSelect">User:</label>
            <select id="userSelect">
                <option value="1">Default User</option>
            </select>
        </div>
    </div>

    <!-- Tab Navigation -->
    <nav class="tab-nav">
        <button class="tab-btn active" data-tab="recommendations">Recommendations</button>
        <button class="tab-btn" data-tab="library">Library</button>
        <button class="tab-btn" data-tab="preferences">Preferences</button>
        <button class="tab-btn" data-tab="sync">Sync</button>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div id="statusBar" class="status-bar"></div>

        <!-- Recommendations Tab -->
        <div id="panel-recommendations" class="tab-panel active">
            <div class="card">
                <h2>Get Recommendations</h2>
                <form id="recForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="recType">Content Type</label>
                            <select id="recType">
                                <option value="book">Book</option>
                                <option value="movie">Movie</option>
                                <option value="tv_show">TV Show</option>
                                <option value="video_game">Video Game</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="recCount">Count</label>
                            <input type="number" id="recCount" min="1" max="20" value="5">
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <label style="font-weight:normal; display:flex; align-items:center; gap:6px;">
                                <input type="checkbox" id="recUseLlm" checked> Use AI reasoning
                            </label>
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <button type="submit" class="btn btn-primary">Get Recommendations</button>
                        </div>
                    </div>
                </form>
            </div>
            <div id="recResults"></div>
        </div>

        <!-- Library Tab -->
        <div id="panel-library" class="tab-panel">
            <div class="card">
                <h2>Library</h2>
                <div class="library-filters">
                    <div class="form-group">
                        <label for="libType">Type</label>
                        <select id="libType">
                            <option value="">All Types</option>
                            <option value="book">Book</option>
                            <option value="movie">Movie</option>
                            <option value="tv_show">TV Show</option>
                            <option value="video_game">Video Game</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="libStatus">Status</label>
                        <select id="libStatus">
                            <option value="">All Statuses</option>
                            <option value="unread">Unread</option>
                            <option value="currently_consuming">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="libraryResults"></div>
        </div>

        <!-- Preferences Tab -->
        <div id="panel-preferences" class="tab-panel">
            <div class="card">
                <h2>Preferences</h2>
                <div id="prefContent">
                    <div class="empty-state"><p>Loading preferences...</p></div>
                </div>
            </div>
        </div>

        <!-- Sync Tab -->
        <div id="panel-sync" class="tab-panel">
            <div class="card">
                <h2>Sync Sources</h2>
                <p style="margin-bottom:16px; color:#666; font-size:0.9em;">
                    Trigger data syncs from your configured sources.
                </p>
                <div class="sync-grid">
                    <div class="sync-card">
                        <h3>Goodreads</h3>
                        <button class="btn btn-primary sync-btn" data-source="goodreads">Sync Goodreads</button>
                        <div class="sync-result"></div>
                    </div>
                    <div class="sync-card">
                        <h3>Steam</h3>
                        <button class="btn btn-primary sync-btn" data-source="steam">Sync Steam</button>
                        <div class="sync-result"></div>
                    </div>
                    <div class="sync-card">
                        <h3>All Sources</h3>
                        <button class="btn btn-secondary sync-btn" data-source="all">Sync All Sources</button>
                        <div class="sync-result"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
